<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powerlifting Matcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0b0f; }
        .loader {
            border-top-color: #eab308;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="border-b border-gray-800 bg-[#0f0f15] py-5 px-4 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-wider text-yellow-500 flex items-center gap-2">
                <i class="fa-solid fa-dumbbell text-yellow-500"></i> POWERDATA MATCH
            </h1>
            <span class="text-xs font-semibold bg-yellow-500/10 text-yellow-500 px-3 py-1 rounded-full border border-yellow-500/20">
                PRO EDITION
            </span>
        </div>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold md:text-4xl text-white mb-2">Compara tus marcas de Fuerza</h2>
            <p class="text-gray-400 text-sm md:text-base">Introduce tus marcas y descubre a tus rivales en la tarima.</p>
        </div>

        <div class="bg-[#12121a] border border-gray-800 rounded-2xl p-6 shadow-2xl mb-8">
            <form id="form-buscador" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2" for="total">
                        Total SBD Levantado (kg)
                    </label>
                    <input type="number" step="0.1" id="total" required placeholder="Ej: 520"
                        class="w-full bg-[#181824] border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-500 text-lg">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2" for="bodyweight">
                        Tu Peso Corporal (kg)
                    </label>
                    <input type="number" step="0.1" id="bodyweight" required placeholder="Ej: 82.5"
                        class="w-full bg-[#181824] border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-500 text-lg">
                </div>
                <div class="md:col-span-2 pt-2">
                    <button type="submit" id="btn-buscar"
                        class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black uppercase py-4 rounded-xl shadow-lg transition duration-200 transform hover:scale-[1.01] flex justify-center items-center gap-3">
                        <span>Encontrar Rivales</span>
                    </button>
                </div>
            </form>
        </div>

        <div id="loader-container" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-800 h-16 w-16 mb-4"></div>
            <p class="text-yellow-500 font-bold tracking-wider animate-pulse text-sm">PROCESANDO DATOS EN TIEMPO REAL...</p>
        </div>

        <div id="seccion-resultados" class="hidden space-y-10">
            
            <div>
                <h3 class="text-lg font-bold text-white mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-equals text-yellow-500"></i> Atletas con tu mismo Total (<span id="total-exacto-label"></span> kg):
                </h3>
                <div id="lista-exactos" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div>
                <h3 class="text-lg font-bold text-white mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-arrow-trend-up text-yellow-500"></i> Siguientes 10 rivales a batir (Total Superior):
                </h3>
                <div id="lista-rivales" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

        </div>
    </main>

    <footer class="border-t border-gray-900 bg-[#07070a] py-6 text-center text-xs text-gray-600">
        <p>&copy; 2026 PowerData Match. Todos los derechos reservados.</p>
    </footer>

    <script>
        function generarTarjetaHTML(atleta) {
            return `
                <div class="bg-[#12121a] border border-gray-800 rounded-xl p-5 shadow-lg relative overflow-hidden flex flex-col justify-between">
                    <div class="absolute top-0 left-0 w-1 h-full ${atleta.sexo === 'M' ? 'bg-blue-500' : 'bg-pink-500'}"></div>
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-white text-md tracking-wide pl-2">${atleta.nombre}</h4>
                            <span class="text-xs bg-[#181824] px-2.5 py-1 rounded-md text-gray-400 border border-gray-700 font-semibold">
                                Cat: ${atleta.weight_class}
                            </span>
                        </div>
                        <div class="flex items-baseline gap-2 mb-4 pl-2">
                            <span class="text-3xl font-black text-yellow-500">${atleta.total} <span class="text-xs font-normal text-gray-400">kg</span></span>
                            <span class="text-xs font-semibold text-gray-500">| BW: ${atleta.bodyweight}kg</span>
                        </div>
                    </div>
                    <div class="border-t border-gray-800/80 pt-3 flex justify-between items-center text-xs">
                        <div class="flex gap-3 text-gray-400">
                            <span><b class="text-green-500">SQ:</b> ${atleta.sentadilla}k</span>
                            <span><b class="text-blue-400">BP:</b> ${atleta.banca}k</span>
                            <span><b class="text-red-500">DL:</b> ${atleta.peso_muerto}k</span>
                        </div>
                    </div>
                </div>`;
        }

        document.getElementById('form-buscador').addEventListener('submit', async function(e) {
            e.preventDefault();
            const total = document.getElementById('total').value;
            const bodyweight = document.getElementById('bodyweight').value;

            const btnBuscar = document.getElementById('btn-buscar');
            const loaderContainer = document.getElementById('loader-container');
            const seccionResultados = document.getElementById('seccion-resultados');
            const listaExactos = document.getElementById('lista-exactos');
            const listaRivales = document.getElementById('lista-rivales');

            document.getElementById('total-exacto-label').textContent = total;

            // Activar Loader
            loaderContainer.classList.remove('hidden');
            seccionResultados.classList.add('hidden');
            btnBuscar.disabled = true;
            btnBuscar.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const response = await fetch('/buscar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ total: parseFloat(total), bodyweight: parseFloat(bodyweight) })
                });
                const data = await response.json();

                if (data.success) {
                    listaExactos.innerHTML = '';
                    listaRivales.innerHTML = '';

                    // 1. Renderizar Empates Exactos
                    if (data.empates.length === 0) {
                        listaExactos.innerHTML = `
                            <div class="col-span-1 md:col-span-2 text-center py-6 bg-[#12121a] border border-gray-800 rounded-2xl">
                                <p class="text-gray-500 text-sm">Nadie tiene exactamente tu total de ${total} kg registrado aún.</p>
                            </div>`;
                    } else {
                        data.empates.forEach(atleta => {
                            listaExactos.innerHTML += generarTarjetaHTML(atleta);
                        });
                    }

                    // 2. Renderizar Rivales Superiores
                    if (data.rivales.length === 0) {
                        listaRivales.innerHTML = `
                            <div class="col-span-1 md:col-span-2 text-center py-6 bg-[#12121a] border border-gray-800 rounded-2xl">
                                <p class="text-gray-500 text-sm">🔥 ¡Eres el número uno de la base de datos! No hay rivales por encima.</p>
                            </div>`;
                    } else {
                        data.rivales.forEach(atleta => {
                            listaRivales.innerHTML += generarTarjetaHTML(atleta);
                        });
                    }

                    seccionResultados.classList.remove('hidden');
                } else {
                    alert("Error en la búsqueda: " + data.error);
                }
            } catch (error) {
                alert("Error de conexión.");
            } finally {
                loaderContainer.classList.add('hidden');
                btnBuscar.disabled = false;
                btnBuscar.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
