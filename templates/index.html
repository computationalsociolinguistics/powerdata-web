<div id="cromo-atleta" class="cromo-holografico w-[300px] h-[430px] rounded-2xl p-6 relative overflow-hidden flex flex-col justify-between">
    <div class="absolute -top-20 -left-20 w-44 h-44 bg-purple-600/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-20 -right-20 w-44 h-44 bg-yellow-500/10 rounded-full blur-3xl"></div>
    
    <div class="relative z-10">
        <div class="flex justify-between items-start">
            <div>
                <span class="text-[10px] tracking-widest text-yellow-500 font-bold uppercase">POWERLIFTER</span>
                <h4 id="cromo-nombre" class="text-xl font-black text-white leading-tight truncate max-w-[180px]">ATLETA</h4>
            </div>
            <span id="cromo-sex-badge" class="bg-blue-500/10 text-blue-400 border border-blue-500/20 text-[10px] font-bold px-2 py-0.5 rounded-full">CAT</span>
        </div>
        <div class="flex gap-2 items-center mt-2 text-xs text-gray-400">
            <span>BW: <b id="cromo-bw" class="text-white">--kg</b></span>
            <span>|</span>
            <span>Clase: <b id="cromo-class" class="text-white">--</b></span>
        </div>
    </div>

    <div class="text-center relative z-10 my-4">
        <span class="text-[10px] tracking-widest text-gray-400 font-semibold block mb-1">TOTAL SBD</span>
        <div class="text-5xl font-black text-yellow-500 tracking-tight" id="cromo-total">0.0 <span class="text-lg">kg</span></div>
        <div class="inline-block mt-3 bg-white/5 border border-white/10 px-3 py-1 rounded-full">
            <span class="text-[10px] text-gray-400">Percentil de Fuerza: <strong id="cromo-percentil" class="text-yellow-400">--%</strong></span>
        </div>
    </div>

    <div class="border-t border-gray-800/80 pt-4 relative z-10">
        <div class="grid grid-cols-3 text-center gap-1">
            <div class="bg-white/5 py-2 rounded-lg border border-white/5">
                <span class="text-[9px] text-green-500 font-bold block">SQUAT</span>
                <span id="cromo-sq" class="text-sm font-black text-white">0 kg</span>
            </div>
            <div class="bg-white/5 py-2 rounded-lg border border-white/5">
                <span class="text-[9px] text-blue-400 font-bold block">BENCH</span>
                <span id="cromo-bp" class="text-sm font-black text-white">0 kg</span>
            </div>
            <div class="bg-white/5 py-2 rounded-lg border border-white/5">
                <span class="text-[9px] text-red-500 font-bold block">DEADLIFT</span>
                <span id="cromo-dl" class="text-sm font-black text-white">0 kg</span>
            </div>
        </div>
        <!-- Aquí está tu firma de copyright actualizada -->
        <div class="text-center mt-4 text-[9px] font-semibold tracking-wider text-yellow-500/40 uppercase">
            <i class="fa-solid fa-copyright"></i> Damián Morales Sánchez
        </div>
    </div>
</div>
